# Weekly cron (UTC). Unattended: set Repository Variable SCHEDULE_TICKER (and optional overrides).
# Full CLI-parity form: use workflow "Scheduled analysis (manual now)".

name: Scheduled analysis (weekly)

on:
  schedule:
    - cron: "15 1 * * 1" # 01:15 UTC Monday — adjust

concurrency:
  group: scheduled-analysis-weekly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  call:
    uses: ./.github/workflows/tradingagents-analysis-run.yml
    secrets: inherit
    with:
      ticker: ${{ vars.SCHEDULE_TICKER }}
      analysis_date: ${{ vars.SCHEDULE_ANALYSIS_DATE }}
      output_language: ${{ vars.SCHEDULE_OUTPUT_LANGUAGE || 'English' }}
      output_language_custom: ${{ vars.SCHEDULE_OUTPUT_LANGUAGE_CUSTOM }}
      include_market: ${{ vars.SCHEDULE_INCLUDE_MARKET != 'false' }}
      include_social: ${{ vars.SCHEDULE_INCLUDE_SOCIAL != 'false' }}
      include_news: ${{ vars.SCHEDULE_INCLUDE_NEWS != 'false' }}
      include_fundamentals: ${{ vars.SCHEDULE_INCLUDE_FUNDAMENTALS != 'false' }}
      research_depth: ${{ vars.SCHEDULE_RESEARCH_DEPTH || '1' }}
      llm_provider: ${{ vars.SCHEDULE_LLM_PROVIDER || 'openai' }}
      quick_model: ${{ vars.SCHEDULE_QUICK_MODEL || 'gpt-5.4-mini' }}
      deep_model: ${{ vars.SCHEDULE_DEEP_MODEL || 'gpt-5.4' }}
      google_thinking_level: ${{ vars.SCHEDULE_GOOGLE_THINKING_LEVEL || 'none' }}
      openai_reasoning_effort: ${{ vars.SCHEDULE_OPENAI_REASONING_EFFORT || 'none' }}
      anthropic_effort: ${{ vars.SCHEDULE_ANTHROPIC_EFFORT || 'none' }}
