# Manual run — same inputs as interactive CLI (see tradingagents-analysis-run.yml).

name: Scheduled analysis (manual now)

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Step 1 — Ticker (cli get_ticker)"
        type: string
        required: true
      analysis_date:
        description: "Step 2 — YYYY-MM-DD. Leave empty for UTC today (runner)."
        type: string
        required: false
        default: ""
      output_language:
        description: "Step 3 — Output language (cli ask_output_language)"
        type: choice
        options:
          - English
          - Chinese
          - Japanese
          - Korean
          - Hindi
          - Spanish
          - Portuguese
          - French
          - German
          - Arabic
          - Russian
          - custom
        default: English
      output_language_custom:
        description: "When output_language is custom — language name"
        type: string
        required: false
        default: ""
      include_market:
        description: "Step 4 — Analyst: Market (checkbox)"
        type: boolean
        default: true
      include_social:
        description: "Step 4 — Analyst: Social"
        type: boolean
        default: true
      include_news:
        description: "Step 4 — Analyst: News"
        type: boolean
        default: true
      include_fundamentals:
        description: "Step 4 — Analyst: Fundamentals"
        type: boolean
        default: true
      research_depth:
        description: "Step 5 — Research depth (cli select_research_depth): 1=Shallow, 3=Medium, 5=Deep"
        type: choice
        options:
          - "1"
          - "3"
          - "5"
        default: "1"
      llm_provider:
        description: "Step 6 — Provider (cli select_llm_provider)"
        type: choice
        options:
          - openai
          - siliconflow
          - google
          - anthropic
          - xai
          - openrouter
          - ollama
        default: openai
      quick_model:
        description: "Step 7 — Quick-Thinking LLM (cli select_shallow_thinking_agent)"
        type: choice
        options:
          - Qwen/Qwen3-32B
          - deepseek-ai/DeepSeek-V3
          - Qwen/Qwen3-14B
          - gpt-5.4-mini
          - gpt-5.4-nano
          - gpt-5.4
          - gpt-4.1
          - claude-sonnet-4-6
          - claude-haiku-4-5
          - claude-sonnet-4-5
          - gemini-3-flash-preview
          - gemini-2.5-flash
          - gemini-3.1-flash-lite-preview
          - gemini-2.5-flash-lite
          - grok-4-1-fast-non-reasoning
          - grok-4-fast-non-reasoning
          - grok-4-1-fast-reasoning
          - "nvidia/nemotron-3-nano-30b-a3b:free"
          - "z-ai/glm-4.5-air:free"
          - "qwen3:latest"
          - "gpt-oss:latest"
          - "glm-4.7-flash:latest"
        default: gpt-5.4-mini
      deep_model:
        description: "Step 7 — Deep-Thinking LLM (cli select_deep_thinking_agent)"
        type: choice
        options:
          - Pro/MiniMaxAI/MiniMax-M2.5
          - Qwen/Qwen3-235B-A22B-Instruct-2507
          - deepseek-ai/DeepSeek-V3
          - gpt-5.4
          - gpt-5.2
          - gpt-5.4-mini
          - gpt-5.4-pro
          - claude-opus-4-6
          - claude-opus-4-5
          - claude-sonnet-4-6
          - claude-sonnet-4-5
          - gemini-3.1-pro-preview
          - gemini-3-flash-preview
          - gemini-2.5-pro
          - gemini-2.5-flash
          - grok-4-0709
          - grok-4-1-fast-reasoning
          - grok-4-fast-reasoning
          - grok-4-1-fast-non-reasoning
          - "z-ai/glm-4.5-air:free"
          - "nvidia/nemotron-3-nano-30b-a3b:free"
          - "glm-4.7-flash:latest"
          - "gpt-oss:latest"
          - "qwen3:latest"
        default: gpt-5.4
      google_thinking_level:
        description: "Step 8 — Gemini only (cli ask_gemini_thinking_config)"
        type: choice
        options:
          - none
          - high
          - minimal
        default: none
      openai_reasoning_effort:
        description: "Step 8 — OpenAI / SiliconFlow (cli ask_openai_reasoning_effort)"
        type: choice
        options:
          - none
          - medium
          - high
          - low
        default: none
      anthropic_effort:
        description: "Step 8 — Anthropic only (cli ask_anthropic_effort)"
        type: choice
        options:
          - none
          - high
          - medium
          - low
        default: none

concurrency:
  group: scheduled-analysis-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  call:
    uses: ./.github/workflows/tradingagents-analysis-run.yml
    secrets: inherit
    with:
      ticker: ${{ github.event.inputs.ticker }}
      analysis_date: ${{ github.event.inputs.analysis_date }}
      output_language: ${{ github.event.inputs.output_language }}
      output_language_custom: ${{ github.event.inputs.output_language_custom }}
      include_market: ${{ github.event.inputs.include_market }}
      include_social: ${{ github.event.inputs.include_social }}
      include_news: ${{ github.event.inputs.include_news }}
      include_fundamentals: ${{ github.event.inputs.include_fundamentals }}
      research_depth: ${{ github.event.inputs.research_depth }}
      llm_provider: ${{ github.event.inputs.llm_provider }}
      quick_model: ${{ github.event.inputs.quick_model }}
      deep_model: ${{ github.event.inputs.deep_model }}
      google_thinking_level: ${{ github.event.inputs.google_thinking_level }}
      openai_reasoning_effort: ${{ github.event.inputs.openai_reasoning_effort }}
      anthropic_effort: ${{ github.event.inputs.anthropic_effort }}
