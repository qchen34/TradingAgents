# Reusable: mirrors interactive CLI steps (cli/utils.py get_user_selections + model_catalog).
# Called from scheduled-analysis-*.yml workflows.

on:
  workflow_call:
    inputs:
      ticker:
        description: "Step 1 — Ticker (cli get_ticker)"
        type: string
        required: true
      analysis_date:
        description: "Step 2 — YYYY-MM-DD. Leave empty for UTC today (runner)."
        type: string
        required: false
        default: ""
      output_language:
        description: "Step 3 — Output language (cli ask_output_language)"
        type: choice
        options:
          - English
          - Chinese
          - Japanese
          - Korean
          - Hindi
          - Spanish
          - Portuguese
          - French
          - German
          - Arabic
          - Russian
          - custom
        default: English
      output_language_custom:
        description: "When output_language is custom — language name (cli custom branch)"
        type: string
        required: false
        default: ""
      include_market:
        description: "Step 4 — Analyst: Market (checkbox)"
        type: boolean
        default: true
      include_social:
        description: "Step 4 — Analyst: Social"
        type: boolean
        default: true
      include_news:
        description: "Step 4 — Analyst: News"
        type: boolean
        default: true
      include_fundamentals:
        description: "Step 4 — Analyst: Fundamentals"
        type: boolean
        default: true
      research_depth:
        description: "Step 5 — Research depth (cli select_research_depth)"
        type: choice
        options:
          - "1"
          - "3"
          - "5"
        default: "1"
      llm_provider:
        description: "Step 6 — Provider (cli select_llm_provider)"
        type: choice
        options:
          - openai
          - siliconflow
          - google
          - anthropic
          - xai
          - openrouter
          - ollama
        default: openai
      quick_model:
        description: "Step 7 — Quick-Thinking LLM (cli select_shallow_thinking_agent)"
        type: choice
        options:
          - Qwen/Qwen3-32B
          - deepseek-ai/DeepSeek-V3
          - Qwen/Qwen3-14B
          - gpt-5.4-mini
          - gpt-5.4-nano
          - gpt-5.4
          - gpt-4.1
          - claude-sonnet-4-6
          - claude-haiku-4-5
          - claude-sonnet-4-5
          - gemini-3-flash-preview
          - gemini-2.5-flash
          - gemini-3.1-flash-lite-preview
          - gemini-2.5-flash-lite
          - grok-4-1-fast-non-reasoning
          - grok-4-fast-non-reasoning
          - grok-4-1-fast-reasoning
          - "nvidia/nemotron-3-nano-30b-a3b:free"
          - "z-ai/glm-4.5-air:free"
          - "qwen3:latest"
          - "gpt-oss:latest"
          - "glm-4.7-flash:latest"
        default: gpt-5.4-mini
      deep_model:
        description: "Step 7 — Deep-Thinking LLM (cli select_deep_thinking_agent)"
        type: choice
        options:
          - Pro/MiniMaxAI/MiniMax-M2.5
          - Qwen/Qwen3-235B-A22B-Instruct-2507
          - deepseek-ai/DeepSeek-V3
          - gpt-5.4
          - gpt-5.2
          - gpt-5.4-mini
          - gpt-5.4-pro
          - claude-opus-4-6
          - claude-opus-4-5
          - claude-sonnet-4-6
          - claude-sonnet-4-5
          - gemini-3.1-pro-preview
          - gemini-3-flash-preview
          - gemini-2.5-pro
          - gemini-2.5-flash
          - grok-4-0709
          - grok-4-1-fast-reasoning
          - grok-4-fast-reasoning
          - grok-4-1-fast-non-reasoning
          - "z-ai/glm-4.5-air:free"
          - "nvidia/nemotron-3-nano-30b-a3b:free"
          - "glm-4.7-flash:latest"
          - "gpt-oss:latest"
          - "qwen3:latest"
        default: gpt-5.4
      google_thinking_level:
        description: "Step 8 — Gemini only (cli ask_gemini_thinking_config). Use 'none' if not Google."
        type: choice
        options:
          - none
          - high
          - minimal
        default: none
      openai_reasoning_effort:
        description: "Step 8 — OpenAI / SiliconFlow (cli ask_openai_reasoning_effort). Use 'none' if N/A."
        type: choice
        options:
          - none
          - medium
          - high
          - low
        default: none
      anthropic_effort:
        description: "Step 8 — Anthropic only (cli ask_anthropic_effort). Use 'none' if N/A."
        type: choice
        options:
          - none
          - high
          - medium
          - low
        default: none

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Resolve CLI-parity parameters
        id: cfg
        run: |
          set -e
          TICKER="$(echo "${{ inputs.ticker }}" | tr '[:lower:]' '[:upper:]' | xargs)"
          D="${{ inputs.analysis_date }}"
          if [ -n "$D" ]; then
            DATE="$D"
          else
            DATE="$(date -u +%Y-%m-%d)"
          fi

          OL="${{ inputs.output_language }}"
          if [ "$OL" = "custom" ]; then
            OC="${{ inputs.output_language_custom }}"
            if [ -z "${OC// }" ]; then
              echo "output_language is custom but output_language_custom is empty."
              exit 1
            fi
            OUT_LANG="$OC"
          else
            OUT_LANG="$OL"
          fi

          PARTS=""
          if [ "${{ inputs.include_market }}" = "true" ]; then PARTS="${PARTS}market,"; fi
          if [ "${{ inputs.include_social }}" = "true" ]; then PARTS="${PARTS}social,"; fi
          if [ "${{ inputs.include_news }}" = "true" ]; then PARTS="${PARTS}news,"; fi
          if [ "${{ inputs.include_fundamentals }}" = "true" ]; then PARTS="${PARTS}fundamentals,"; fi
          ANALYSTS="${PARTS%,}"
          if [ -z "$ANALYSTS" ]; then
            echo "Select at least one analyst (checkboxes)."
            exit 1
          fi

          PROVIDER="${{ inputs.llm_provider }}"
          case "$PROVIDER" in
            openai) BACKEND="https://api.openai.com/v1" ;;
            siliconflow) BACKEND="https://api.siliconflow.cn/v1" ;;
            google) BACKEND="https://generativelanguage.googleapis.com/v1" ;;
            anthropic) BACKEND="https://api.anthropic.com/" ;;
            xai) BACKEND="https://api.x.ai/v1" ;;
            openrouter) BACKEND="https://openrouter.ai/api/v1" ;;
            ollama) BACKEND="http://localhost:11434/v1" ;;
            *) echo "Unknown provider"; exit 1 ;;
          esac

          GTL="${{ inputs.google_thinking_level }}"
          [ "$GTL" = "none" ] && GTL=""
          ORE="${{ inputs.openai_reasoning_effort }}"
          [ "$ORE" = "none" ] && ORE=""
          AE="${{ inputs.anthropic_effort }}"
          [ "$AE" = "none" ] && AE=""

          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "analysts=$ANALYSTS" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND" >> "$GITHUB_OUTPUT"

          {
            echo "SCHEDULE_OUTPUT_LANGUAGE=$OUT_LANG"
            echo "SCHEDULE_RESEARCH_DEPTH=${{ inputs.research_depth }}"
            echo "SCHEDULE_LLM_PROVIDER=$PROVIDER"
            echo "SCHEDULE_BACKEND_URL=$BACKEND"
            echo "SCHEDULE_QUICK_MODEL=${{ inputs.quick_model }}"
            echo "SCHEDULE_DEEP_MODEL=${{ inputs.deep_model }}"
            echo "SCHEDULE_GOOGLE_THINKING_LEVEL=$GTL"
            echo "SCHEDULE_OPENAI_REASONING_EFFORT=$ORE"
            echo "SCHEDULE_ANTHROPIC_EFFORT=$AE"
          } >> "$GITHUB_ENV"

      - name: Run headless analysis
        env:
          TRADINGAGENTS_CI: "1"
        run: |
          OUT="reports/_ci/${{ github.run_id }}"
          mkdir -p "$OUT"
          python scripts/github_scheduled_analysis.py \
            --ticker "${{ steps.cfg.outputs.ticker }}" \
            --date "${{ steps.cfg.outputs.date }}" \
            --output-dir "$OUT" \
            --analysts "${{ steps.cfg.outputs.analysts }}" \
            --research-depth "${{ inputs.research_depth }}" \
            --llm-provider "${{ inputs.llm_provider }}" \
            --backend-url "${{ steps.cfg.outputs.backend_url }}" \
            --quick-model "${{ inputs.quick_model }}" \
            --deep-model "${{ inputs.deep_model }}" \
            --output-language "$SCHEDULE_OUTPUT_LANGUAGE" \
            ${SCHEDULE_OPENAI_REASONING_EFFORT:+--openai-reasoning-effort "$SCHEDULE_OPENAI_REASONING_EFFORT"} \
            ${SCHEDULE_GOOGLE_THINKING_LEVEL:+--google-thinking-level "$SCHEDULE_GOOGLE_THINKING_LEVEL"} \
            ${SCHEDULE_ANTHROPIC_EFFORT:+--anthropic-effort "$SCHEDULE_ANTHROPIC_EFFORT"}

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: tradingagents-report-${{ steps.cfg.outputs.ticker }}-${{ github.run_id }}
          path: reports/_ci/${{ github.run_id }}
          retention-days: 14
